# ═══════════════════════════════════════════════════════════════
# docker-compose.yml - Local Development Environment
# Runs the app with NGINX reverse proxy locally
# ═══════════════════════════════════════════════════════════════

version: '3.9'

services:
  # ─── Node.js Application ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: github-aws-pipeline-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOST=0.0.0.0
      - APP_VERSION=local-dev
    env_file:
      - .env.local
    volumes:
      # Mount source code for hot reload in development
      - ./app/src:/app/src:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── NGINX Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: github-aws-pipeline-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./aws/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ─── Networks ─────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  nginx-logs:
    driver: local
